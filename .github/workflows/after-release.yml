name: After Release

on:
  release:
    types: [published]
  repository_dispatch:
    types: [after-release]
  workflow_dispatch:

jobs:
  # Core template releases update engine deps in same repo (manual releases only).
  # During weekly releases, the intra-wave hook in release-plan.yml handles this.
  self-update:
    if: >-
      github.event_name == 'release' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.release.tag_name, '/')
    uses: gofiber/.github/.github/workflows/after-release.yml@main
    with:
      repos: |
        - gofiber/template
    secrets:
      dispatch-token: ${{ secrets.DISPATCH_TOKEN }}

  # Notify downstream repos. Runs for manual releases and weekly batch dispatch.
  notify-dependents:
    if: github.event_name != 'release' || github.actor != 'github-actions[bot]'
    uses: gofiber/.github/.github/workflows/after-release.yml@main
    with:
      repos: |
        - gofiber/recipes
    secrets:
      dispatch-token: ${{ secrets.DISPATCH_TOKEN }}
