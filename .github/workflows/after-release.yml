name: After Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # When core is released, trigger dependabot in self (for engine deps)
  self-update:
    if: "!contains(github.event.release.tag_name, '/')"
    runs-on: ubuntu-latest
    steps:
      - uses: gofiber/.github/.github/actions/trigger-dependabot@main
        with:
          reason: 'core ${{ github.event.release.tag_name }} released'

  # Trigger dependabot in dependent repos for any template module release
  notify-dependents:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - gofiber/recipes
    steps:
      - uses: gofiber/.github/.github/actions/trigger-dependabot@main
        with:
          repo: ${{ matrix.repo }}
          reason: 'template ${{ github.event.release.tag_name }} released'
          token: ${{ secrets.DISPATCH_TOKEN }}
